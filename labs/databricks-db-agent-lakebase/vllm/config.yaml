# vLLM server defaults — loaded via `vllm serve --config /etc/vllm/config.yaml`.
# Keys map 1:1 to CLI flags (replace `_` with `-`).

model: meta-llama/Meta-Llama-3-8B-Instruct
served-model-name: llama3-8b
host: 0.0.0.0
port: 8000

# Compute / memory
dtype: auto
max-model-len: 8192
gpu-memory-utilization: 0.90

# Logging
disable-log-requests: false
